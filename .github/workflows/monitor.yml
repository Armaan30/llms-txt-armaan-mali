# Runs the monitoring check hourly. Vercel's Hobby plan caps native crons at
# once daily, so this workflow supplements the vercel.json cron by calling
# the same protected endpoint on a faster schedule.
#
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   APP_URL      e.g. https://llms-txt-armaan-mali.vercel.app
#   CRON_SECRET  same value as the Vercel env var
name: monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {} # allows manual runs from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger monitoring check
        run: |
          # Strip any trailing slash from APP_URL so we never hit a 308 redirect.
          base="${{ secrets.APP_URL }}"
          base="${base%/}"
          body=$(curl -fsS --max-time 300 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$base/api/cron/check")
          echo "$body"
          # A redirect page or error body is a failure, not a success.
          echo "$body" | grep -q '"checked"' || { echo "::error::Unexpected response — check APP_URL (https, no trailing slash) and CRON_SECRET"; exit 1; }
